<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Camera Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0c0f;
      --panel: #111418;
      --border: #1e2a1e;
      --green: #00ff88;
      --green-dim: #00ff8833;
      --green-mid: #00cc66;
      --text: #c8ffd4;
      --muted: #4a6b52;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 9;
    }

    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.12em;
      color: var(--green);
      text-shadow: 0 0 16px var(--green);
    }

    .logo span {
      font-size: 0.9rem;
      color: var(--muted);
      margin-left: 0.6rem;
      letter-spacing: 0.2em;
      vertical-align: middle;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .feed-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      border: 1px solid var(--border);
      background: #000;
      box-shadow: 0 0 0 1px var(--green-dim), 0 0 40px rgba(0,255,136,0.08);
    }

    .feed-wrapper::before, .feed-wrapper::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--green);
      border-style: solid;
      z-index: 5;
    }
    .feed-wrapper::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .feed-wrapper::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .corner-tr, .corner-bl {
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--green); border-style: solid; z-index: 5;
    }
    .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

    .feed-wrapper img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .hud-top {
      position: absolute; top: 10px; left: 14px;
      font-size: 0.62rem; color: var(--green);
      letter-spacing: 0.1em; opacity: 0.7; z-index: 6;
    }

    .hud-bottom {
      position: absolute; bottom: 10px; right: 14px;
      font-size: 0.62rem; color: var(--green);
      letter-spacing: 0.1em; opacity: 0.7; z-index: 6; text-align: right;
    }

    .rec-label {
      position: absolute; top: 10px; right: 14px;
      display: flex; align-items: center; gap: 5px;
      font-size: 0.65rem; color: #ff4444;
      letter-spacing: 0.12em; z-index: 6;
    }

    .rec-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff4444; box-shadow: 0 0 6px #ff4444;
      animation: pulse 1s ease-in-out infinite;
    }

    /* YOLO info bar below video */
    .yolo-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.8rem;
      padding: 0.5rem 0.8rem;
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .yolo-bar .tag {
      background: var(--green-dim);
      color: var(--green);
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--green);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }

    footer {
      margin-top: 0.8rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
    }

    #clock { color: var(--green-mid); }
  </style>
</head>
<body>

  <header>
    <div class="logo">LIVECAM <span>+ YOLO</span></div>
    <div class="status-bar">
      <div class="dot"></div>
      <span>DETECTION ACTIVE &mdash; USB CAM &mdash; 640p</span>
    </div>
  </header>

  <div class="feed-wrapper">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="hud-top">CAM_01 / YOLOv8n / MJPEG</div>
    <div class="rec-label"><div class="rec-dot"></div> REC</div>
    <div class="hud-bottom" id="clock"></div>
    <img src="/video_feed" alt="Live Camera Feed" />
  </div>

  <div class="yolo-bar">
    <span>MODEL: <span style="color:var(--green)">YOLOv8 NANO</span></span>
    <span class="tag">80 COCO CLASSES</span>
    <span>CONF THRESHOLD: <span style="color:var(--green)">45%</span></span>
    <span>BOXES DRAWN IN STREAM</span>
  </div>

  <footer>MJPEG STREAM &bull; PORT 5000 &bull; RASPBERRY PI &bull; OBJECT DETECTION</footer>

  <script>
    function updateClock() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
